name: CI/CD

on:
  pull_request:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Gemfile
        run: |
          sed -i 's#git@github.com:#https://github.com/#g' Gemfile
          sed -i 's#git@github.com:#https://github.com/#g' Gemfile.lock

      - name: Setup config files
        run: |
          cp config/database.yml.example config/database.yml
          cp config/application.yml.example config/application.yml
          cp config/amqp.yml.example config/amqp.yml

      - name: Upload config files
        uses: actions/upload-artifact@v4
        with:
          name: ConfigFiles
          path: |
            Gemfile
            Gemfile.lock
            config/database.yml
            config/application.yml
            config/amqp.yml

  test_suite:
    env:
      BUNDLE_GITHUB__COM: "x-access-token:${{ secrets.GIT_TOKEN }}"

    runs-on: ubuntu-latest
    needs: setup

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      rabbitmq:
        image: rabbitmq:3.12-alpine
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672

    steps:
      - uses: actions/checkout@v4

      - name: Use config files
        uses: actions/download-artifact@v4
        with:
          name: ConfigFiles

      - name: Set up Ruby versions
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup database
        env:
          RAILS_ENV: test
        run: |
          bundle exec rake db:create
          bundle exec rake db:migrate

      - name: Run tests
        run: bundle exec rspec spec -f d
